
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#F7F8FF;--bg2:#FFFFFF;--bg3:#EEF0FF;--card:#FFFFFF;--card2:#F4F5FF;
--accent:#5B5FEF;--accent2:#7C3AED;--green:#16A34A;--yellow:#D97706;--red:#DC2626;
--green-bg:#DCFCE7;--yellow-bg:#FEF3C7;--red-bg:#FEE2E2;
--green-light:#BBF7D0;--yellow-light:#FDE68A;--red-light:#FECACA;
--text:#1E1B4B;--text2:#4C4F8A;--text3:#9396C4;--border:#E0E3FF;--radius:14px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}

.header{background:#FFFFFF;padding:16px 20px 12px;border-bottom:1.5px solid var(--border);position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
.logo-sub{color:var(--text3);font-weight:400;font-size:12px;display:block;margin-top:1px}
.header-actions{display:flex;gap:8px}
.icon-btn{background:var(--bg3);border:1.5px solid var(--border);color:var(--accent);width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:600}
.icon-btn:active{background:var(--accent);color:#fff}

.search-bar{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:9px 14px;display:flex;align-items:center;gap:8px}
.search-bar input{background:none;border:none;outline:none;color:var(--text);flex:1;font-size:14px}
.search-bar input::placeholder{color:var(--text3)}

.nav{background:#FFFFFF;border-top:1.5px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));position:sticky;bottom:0}
.nav-btn{flex:1;background:none;border:none;color:var(--text3);padding:6px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:500;transition:color 0.15s}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}
.nav-pip{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:2px;opacity:0}
.nav-btn.active .nav-pip{opacity:1}

.content{flex:1;padding:16px}

.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:16px}
.stat-card{border-radius:var(--radius);padding:14px 10px;text-align:center;border:1.5px solid}
.stat-card.ok{background:var(--green-bg);border-color:var(--green-light)}
.stat-card.warn{background:var(--yellow-bg);border-color:var(--yellow-light)}
.stat-card.danger{background:var(--red-bg);border-color:var(--red-light)}
.stat-num{font-size:26px;font-weight:700}
.stat-num.ok{color:var(--green)}
.stat-num.warn{color:var(--yellow)}
.stat-num.danger{color:var(--red)}
.stat-label{font-size:11px;font-weight:500;margin-top:2px}
.stat-label.ok{color:#15803D}
.stat-label.warn{color:#B45309}
.stat-label.danger{color:#B91C1C}

.cats{display:flex;gap:7px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat-pill{background:#fff;border:1.5px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:20px;white-space:nowrap;font-size:13px;cursor:pointer;flex-shrink:0;font-weight:500}
.cat-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

.items-grid{display:flex;flex-direction:column;gap:10px}
.item-card{background:#fff;border-radius:var(--radius);padding:14px;border:1.5px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.15s}
.item-card:active{border-color:var(--accent)}
.item-card.low{border-left:4px solid var(--yellow);border-radius:0 var(--radius) var(--radius) 0}
.item-card.empty{border-left:4px solid var(--red);border-radius:0 var(--radius) var(--radius) 0}
.item-emoji{font-size:26px;width:46px;height:46px;background:var(--bg3);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid var(--border)}
.item-info{flex:1;min-width:0}
.item-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px}
.item-meta{font-size:12px;color:var(--text3);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.qty-controls{display:flex;flex-direction:column;gap:5px;align-items:center}
.qty-btn{background:var(--bg3);border:1.5px solid var(--border);color:var(--accent);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1}
.qty-btn:active{background:var(--accent);color:#fff;border-color:var(--accent)}
.item-qty{font-size:20px;font-weight:700;min-width:28px;text-align:center}
.item-qty.ok{color:var(--green)}
.item-qty.warn{color:var(--yellow)}
.item-qty.empty{color:var(--red)}

.section-title{font-size:13px;color:var(--text3);margin-bottom:10px;font-weight:600;display:flex;justify-content:space-between;align-items:center;text-transform:uppercase;letter-spacing:0.5px}

.badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600}
.badge-green{background:var(--green-bg);color:#15803D}
.badge-yellow{background:var(--yellow-bg);color:#B45309}
.badge-red{background:var(--red-bg);color:#B91C1C}
.badge-purple{background:#EDE9FE;color:#6D28D9}

.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:12px}
.btn-primary:active{opacity:0.85}
.btn-secondary{background:#fff;color:var(--text2);border:1.5px solid var(--border);border-radius:12px;padding:12px;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-top:8px}
.btn-danger{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-light);border-radius:12px;padding:12px;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-top:8px}
.btn-green{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-light);border-radius:12px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;flex:1;margin-top:8px}
.btn-wa{background:#E7FFF0;color:#15803D;border:1.5px solid var(--green-light);border-radius:12px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;flex:1;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px}

.overlay{position:fixed;inset:0;background:rgba(30,27,75,0.4);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:22px 22px 0 0;padding:20px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--text3);margin-bottom:6px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:0.4px}
.form-input{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;width:100%;outline:none}
.form-input:focus{border-color:var(--accent);background:#fff}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
select.form-input option{background:#fff}

.shop-item{background:#fff;border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;border:1.5px solid var(--border)}
.shop-check{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700}
.shop-check.checked{background:var(--green);border-color:var(--green);color:#fff}
.shop-name{font-size:14px;font-weight:600;color:var(--text)}
.shop-sub{font-size:12px;color:var(--text3);margin-top:2px}
.shop-link{font-size:12px;color:var(--accent);font-weight:500;text-decoration:none}

.family-card{background:#fff;border-radius:var(--radius);padding:16px;border:1.5px solid var(--border);margin-bottom:10px}
.member-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1.5px solid var(--border)}
.member-row:last-child{border-bottom:none}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.invite-code{background:var(--bg3);border:2px dashed var(--border);border-radius:14px;padding:18px;text-align:center;margin-bottom:12px}
.invite-code .code{font-size:32px;font-weight:800;letter-spacing:8px;color:var(--accent);margin:10px 0}
.invite-code p{font-size:12px;color:var(--text3);font-weight:500}

.activity-row{display:flex;gap:10px;padding:9px 0;border-bottom:1.5px solid var(--border);font-size:13px}
.activity-row:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.activity-text{color:var(--text2);line-height:1.5;font-weight:500}
.activity-time{color:var(--text3);font-size:11px;margin-top:2px}

.chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.chart-label{font-size:12px;color:var(--text2);width:68px;text-align:right;flex-shrink:0;font-weight:500}
.chart-outer{flex:1;background:var(--bg3);border-radius:6px;overflow:hidden;height:24px}
.chart-bar{height:24px;border-radius:6px;background:var(--accent);display:flex;align-items:center;padding:0 8px;min-width:28px;transition:width 0.5s}
.chart-bar-val{font-size:11px;color:#fff;font-weight:700}
.chart-bar.warn{background:var(--yellow)}
.chart-bar.empty-bar{background:var(--red)}

.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-state .icon{font-size:44px;margin-bottom:12px}
.empty-state p{font-size:14px;font-weight:500}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:opacity 0.3s;white-space:nowrap}
.toast.show{opacity:1}
</style>

<div class="app" id="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">家庫 HomStock<span class="logo-sub" id="family-name">我的家庭</span></div>
      <div class="header-actions">
        <button class="icon-btn" onclick="openScanner()" title="掃條碼">&#x1F4F7;</button>
        <button class="icon-btn" onclick="openAddItem()" title="新增">&#x2B;</button>
      </div>
    </div>
    <div class="search-bar">
      <span style="color:var(--text3);font-size:15px">&#x1F50D;</span>
      <input type="text" placeholder="搜尋商品..." id="search-input" oninput="filterItems()">
    </div>
  </div>

  <div class="content" id="main-content"></div>

  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('inventory')" id="tab-inventory">
      <span class="nav-icon">&#x1F3E0;</span>庫存<div class="nav-pip"></div>
    </button>
    <button class="nav-btn" onclick="switchTab('shopping')" id="tab-shopping">
      <span class="nav-icon">&#x1F6D2;</span>採購<div class="nav-pip"></div>
    </button>
    <button class="nav-btn" onclick="switchTab('family')" id="tab-family">
      <span class="nav-icon">&#x1F465;</span>家庭<div class="nav-pip"></div>
    </button>
    <button class="nav-btn" onclick="switchTab('analysis')" id="tab-analysis">
      <span class="nav-icon">&#x1F4CA;</span>分析<div class="nav-pip"></div>
    </button>
  </nav>
</div>

<div class="overlay" id="item-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="item-modal-title">新增商品</div>
    <div class="form-group">
      <label class="form-label">商品名稱</label>
      <input class="form-input" id="item-name" placeholder="例：廁紙">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">類別</label>
        <select class="form-input" id="item-cat">
          <option value="衛生">衛生</option><option value="清潔">清潔</option>
          <option value="個人護理">個人護理</option><option value="廚房">廚房</option>
          <option value="嬰幼兒">嬰幼兒</option><option value="其他">其他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Emoji 圖示</label>
        <input class="form-input" id="item-emoji" placeholder="🧻" maxlength="2">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">目前數量</label>
        <input class="form-input" id="item-qty" type="number" min="0" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">單位</label>
        <select class="form-input" id="item-unit">
          <option>卷</option><option>瓶</option><option>包</option><option>支</option>
          <option>盒</option><option>片</option><option>罐</option><option>個</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">低庫存警示</label>
        <input class="form-input" id="item-threshold" type="number" min="1" placeholder="2">
      </div>
      <div class="form-group">
        <label class="form-label">條碼（選填）</label>
        <input class="form-input" id="item-barcode" placeholder="掃描或手動輸入">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">採購連結（換行分隔）</label>
      <textarea class="form-input" id="item-links" rows="2" placeholder="https://parknshop.com/...&#10;https://hktvmall.com/..."></textarea>
    </div>
    <button class="btn-primary" onclick="saveItem()">儲存</button>
    <button class="btn-secondary" onclick="closeModal('item-modal')">取消</button>
    <button class="btn-danger" id="delete-btn" onclick="deleteCurrentItem()" style="display:none">刪除此商品</button>
  </div>
</div>

<div class="overlay" id="scanner-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">條碼掃描</div>
    <div id="scanner-video-container" style="border-radius:12px;overflow:hidden;margin-bottom:12px;background:var(--bg3);min-height:200px;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--border)">
      <video id="scanner-video" style="width:100%;border-radius:12px" autoplay playsinline muted></video>
    </div>
    <div id="scanner-result" style="font-size:13px;color:var(--text2);text-align:center;margin-bottom:12px;min-height:20px;font-weight:500"></div>
    <button class="btn-secondary" onclick="stopScanner()">取消掃描</button>
  </div>
</div>

<div class="overlay" id="join-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">加入家庭群組</div>
    <div class="form-group">
      <label class="form-label">你的名稱</label>
      <input class="form-input" id="join-name" placeholder="例：媽媽">
    </div>
    <div class="form-group">
      <label class="form-label">邀請碼</label>
      <input class="form-input" id="join-code" placeholder="輸入6位邀請碼" maxlength="6" style="text-transform:uppercase;letter-spacing:6px;font-size:20px;font-weight:700">
    </div>
    <button class="btn-primary" onclick="joinFamily()">加入</button>
    <button class="btn-secondary" onclick="closeModal('join-modal')">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, updateDoc, getDoc, getDocs, addDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKSkbBv4CU0yxazEc8Ws4-zLtk6p4YsTc",
  authDomain: "homeinventory-app.firebaseapp.com",
  projectId: "homeinventory-app",
  storageBucket: "homeinventory-app.firebasestorage.app",
  messagingSenderId: "971110271746",
  appId: "1:971110271746:web:79093bca9eb4f174b9101b"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);

let currentUser=null, familyId=null, familyName="我的家庭", memberName="成員";
let items={}, members={}, activities=[], currentTab='inventory', currentCat='全部', editingItemId=null, scanStream=null, checkedShopItems=new Set();

const defaultItems=[
  {name:"廁紙",emoji:"🧻",cat:"衛生",qty:4,unit:"卷",threshold:2,links:[]},
  {name:"洗頭水",emoji:"🧴",cat:"個人護理",qty:2,unit:"瓶",threshold:1,links:[]},
  {name:"牙膏",emoji:"🪥",cat:"個人護理",qty:2,unit:"支",threshold:1,links:[]},
  {name:"濕紙巾",emoji:"🧻",cat:"衛生",qty:3,unit:"包",threshold:1,links:[]},
  {name:"洗衣液",emoji:"🫧",cat:"清潔",qty:1,unit:"瓶",threshold:1,links:[]},
  {name:"洗碗液",emoji:"🍶",cat:"清潔",qty:2,unit:"瓶",threshold:1,links:[]},
  {name:"沐浴露",emoji:"🚿",cat:"個人護理",qty:2,unit:"瓶",threshold:1,links:[]},
  {name:"面紙",emoji:"📦",cat:"衛生",qty:5,unit:"盒",threshold:2,links:[]},
];

onAuthStateChanged(auth, async user => { if(user){currentUser=user;await initFamily();} });
signInAnonymously(auth).catch(()=>{ showToast("⚠️ 離線模式"); localMode(); });

async function initFamily(){
  const stored=localStorage.getItem('homstock_family');
  if(stored){
    const {fid,fname,mname}=JSON.parse(stored);
    familyId=fid;familyName=fname;memberName=mname;
    document.getElementById('family-name').textContent=fname;
    listenFamily();
  } else { await createFamily(); }
}

async function createFamily(){
  const code=Math.random().toString(36).substr(2,6).toUpperCase();
  memberName="建立者";
  const ref=doc(collection(db,'families'));
  familyId=ref.id; familyName="我的家庭";
  await setDoc(ref,{name:familyName,code,createdAt:serverTimestamp()});
  await setDoc(doc(db,`families/${familyId}/members/${currentUser.uid}`),{name:memberName,uid:currentUser.uid,joinedAt:serverTimestamp()});
  for(const item of defaultItems) await addDoc(collection(db,`families/${familyId}/items`),{...item,updatedBy:memberName,updatedAt:serverTimestamp()});
  localStorage.setItem('homstock_family',JSON.stringify({fid:familyId,fname:familyName,mname:memberName}));
  document.getElementById('family-name').textContent=familyName;
  listenFamily();
}

function listenFamily(){
  onSnapshot(collection(db,`families/${familyId}/items`),snap=>{
    items={};snap.forEach(d=>items[d.id]={...d.data(),id:d.id});
    renderCurrentTab();checkNotifications();
  });
  onSnapshot(collection(db,`families/${familyId}/members`),snap=>{members={};snap.forEach(d=>members[d.id]=d.data());});
  onSnapshot(query(collection(db,`families/${familyId}/activities`),orderBy('ts','desc')),snap=>{
    activities=[];snap.forEach(d=>activities.push(d.data()));
    if(currentTab==='family')renderFamily();
  });
}

async function logActivity(text){
  try{ await addDoc(collection(db,`families/${familyId}/activities`),{text,member:memberName,ts:serverTimestamp(),tsMs:Date.now()}); }catch(e){}
}

function localMode(){
  items={};defaultItems.forEach((it,i)=>{items[`local_${i}`]={...it,id:`local_${i}`};});
  familyId='local';renderCurrentTab();
}

window.switchTab=function(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  renderCurrentTab();
};

function renderCurrentTab(){
  if(currentTab==='inventory')renderInventory();
  else if(currentTab==='shopping')renderShopping();
  else if(currentTab==='family')renderFamily();
  else if(currentTab==='analysis')renderAnalysis();
}

function renderInventory(){
  const search=(document.getElementById('search-input')||{}).value||'';
  const allCats=['全部',...new Set(Object.values(items).map(i=>i.cat).filter(Boolean))];
  let filtered=Object.values(items).filter(i=>{
    return (currentCat==='全部'||i.cat===currentCat)&&(!search||i.name.includes(search));
  });
  const ok=Object.values(items).filter(i=>(i.qty||0)>(i.threshold||1)).length;
  const warn=Object.values(items).filter(i=>(i.qty||0)<=(i.threshold||1)&&(i.qty||0)>0).length;
  const empty=Object.values(items).filter(i=>(i.qty||0)===0).length;

  document.getElementById('main-content').innerHTML=`
    <div class="stats">
      <div class="stat-card ok"><div class="stat-num ok">${ok}</div><div class="stat-label ok">充足</div></div>
      <div class="stat-card warn"><div class="stat-num warn">${warn}</div><div class="stat-label warn">偏低</div></div>
      <div class="stat-card danger"><div class="stat-num danger">${empty}</div><div class="stat-label danger">需補貨</div></div>
    </div>
    <div class="cats">${allCats.map(c=>`<div class="cat-pill${c===currentCat?' active':''}" onclick="setCat('${c}')">${c}</div>`).join('')}</div>
    <div class="section-title"><span>${currentCat} · ${filtered.length} 項</span></div>
    <div class="items-grid">
      ${filtered.length?filtered.sort((a,b)=>(a.qty||0)-(b.qty||0)).map(item=>{
        const q=item.qty||0,t=item.threshold||1;
        const cls=q===0?'empty':q<=t?'low':'';
        const qCls=q===0?'empty':q<=t?'warn':'ok';
        return `<div class="item-card ${cls}" onclick="openEditItem('${item.id}')">
          <div class="item-emoji">${item.emoji||'📦'}</div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-meta">
              <span>${item.cat||''}</span><span>·</span><span>${item.unit||''}</span>
              ${item.links&&item.links.length?`<span class="badge badge-purple">連結</span>`:''}
              ${q===0?`<span class="badge badge-red">已用完</span>`:q<=t?`<span class="badge badge-yellow">偏低</span>`:''}
            </div>
          </div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="event.stopPropagation();changeQty('${item.id}',1)">＋</button>
            <div class="item-qty ${qCls}">${q}</div>
            <button class="qty-btn" onclick="event.stopPropagation();changeQty('${item.id}',-1)">－</button>
          </div>
        </div>`;
      }).join(''):'<div class="empty-state"><div class="icon">📭</div><p>沒有商品</p></div>'}
    </div>
    <div style="height:20px"></div>`;
}

window.setCat=function(cat){currentCat=cat;renderInventory();};
window.filterItems=function(){renderInventory();};

window.changeQty=async function(id,delta){
  const item=items[id];if(!item)return;
  const newQty=Math.max(0,(item.qty||0)+delta);
  items[id].qty=newQty;renderInventory();
  if(familyId!=='local'){
    await updateDoc(doc(db,`families/${familyId}/items/${id}`),{qty:newQty,updatedBy:memberName,updatedAt:serverTimestamp()});
    await logActivity(`${memberName} 將「${item.name}」${delta>0?'增加':'減少'}至 ${newQty} ${item.unit}`);
  }
  if(newQty===0)showToast(`⚠️ ${item.name} 已用完！`);
  else if(newQty<=(item.threshold||1))showToast(`🟡 ${item.name} 庫存偏低`);
};

function renderShopping(){
  const lowItems=Object.values(items).filter(i=>(i.qty||0)<=(i.threshold||1));
  document.getElementById('main-content').innerHTML=`
    <div class="section-title"><span>需補貨 · ${lowItems.length} 項</span></div>
    ${lowItems.length?lowItems.map(item=>{
      const checked=checkedShopItems.has(item.id);
      const links=item.links||[];
      return `<div class="shop-item" style="${checked?'opacity:0.45':''}">
        <div class="shop-check ${checked?'checked':''}" onclick="toggleShopCheck('${item.id}')">${checked?'✓':''}</div>
        <div class="shop-info">
          <div class="shop-name">${item.emoji||'📦'} ${item.name}</div>
          <div class="shop-sub">現有 ${item.qty||0} ${item.unit} · 建議補至 ${(item.threshold||1)*3} ${item.unit}</div>
          ${links.length?links.map((l,i)=>`<a class="shop-link" href="${l}" target="_blank" onclick="event.stopPropagation()">🛒 採購連結${links.length>1?' '+(i+1):''}</a> `).join(''):''}
        </div>
        <span class="badge ${item.qty===0?'badge-red':'badge-yellow'}">${item.qty===0?'已用完':'偏低'}</span>
      </div>`;
    }).join(''):'<div class="empty-state"><div class="icon">🎉</div><p>所有庫存充足！</p></div>'}
    ${lowItems.length?`<div style="display:flex;gap:8px">
      <button class="btn-wa" onclick="shareWhatsApp()"><span style="font-size:15px">📱</span> WhatsApp 分享</button>
      <button class="btn-green" onclick="markAllBought()">全部已購</button>
    </div>`:''}
    <div style="height:20px"></div>`;
}

window.toggleShopCheck=function(id){
  if(checkedShopItems.has(id))checkedShopItems.delete(id);else checkedShopItems.add(id);
  renderShopping();
};
window.markAllBought=async function(){
  const lowItems=Object.values(items).filter(i=>(i.qty||0)<=(i.threshold||1));
  for(const item of lowItems){
    const nq=(item.threshold||1)*3;items[item.id].qty=nq;
    if(familyId!=='local')await updateDoc(doc(db,`families/${familyId}/items/${item.id}`),{qty:nq,updatedBy:memberName,updatedAt:serverTimestamp()});
  }
  if(familyId!=='local')await logActivity(`${memberName} 完成補貨，更新了 ${lowItems.length} 件商品`);
  checkedShopItems.clear();showToast('✅ 已更新所有庫存！');renderCurrentTab();
};
window.shareWhatsApp=function(){
  const lowItems=Object.values(items).filter(i=>(i.qty||0)<=(i.threshold||1));
  let msg=`🏠 *家庫採購清單*\n\n`;
  lowItems.forEach(item=>{msg+=`${item.qty===0?'❌':'⚠️'} ${item.name} (現有：${item.qty||0} ${item.unit})\n`;});
  msg+=`\n_由 HomStock 家庫 生成_`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
};

function renderFamily(){
  const memberList=Object.values(members);
  const inviteCode=localStorage.getItem('homstock_invite')||generateInviteCode();
  const colors=['#5B5FEF','#16A34A','#D97706','#DC2626','#7C3AED','#0891B2'];
  const bgColors=['#EDE9FE','#DCFCE7','#FEF3C7','#FEE2E2','#F3E8FF','#CFFAFE'];
  document.getElementById('main-content').innerHTML=`
    <div class="section-title"><span>邀請家人</span></div>
    <div class="invite-code">
      <p>分享邀請碼給家人</p>
      <div class="code">${inviteCode}</div>
      <p>有效期24小時 · 最多6位成員</p>
    </div>
    <button class="btn-secondary" onclick="copyInviteCode('${inviteCode}')">複製邀請碼</button>
    <button class="btn-secondary" onclick="openJoinFamily()" style="margin-top:6px">加入他人家庭</button>
    <div class="section-title" style="margin-top:20px"><span>成員 (${Math.max(memberList.length,1)})</span></div>
    <div class="family-card">
      ${memberList.length?memberList.map((m,i)=>`
        <div class="member-row">
          <div class="avatar" style="background:${bgColors[i%6]};color:${colors[i%6]}">${(m.name||'?').charAt(0)}</div>
          <div style="flex:1"><div style="font-size:14px;font-weight:600;color:var(--text)">${m.name||'匿名成員'}</div><div style="font-size:12px;color:var(--text3)">成員</div></div>
        </div>`).join(''):`<div class="member-row">
          <div class="avatar" style="background:#EDE9FE;color:#5B5FEF">${memberName.charAt(0)}</div>
          <div style="flex:1"><div style="font-size:14px;font-weight:600;color:var(--text)">${memberName}</div><div style="font-size:12px;color:var(--text3)">管理員</div></div>
        </div>`}
    </div>
    <div class="section-title" style="margin-top:20px"><span>最近動態</span></div>
    <div class="family-card">
      ${activities.length?activities.slice(0,15).map(a=>`
        <div class="activity-row">
          <div class="activity-dot"></div>
          <div><div class="activity-text">${a.text||''}</div><div class="activity-time">${a.tsMs?timeAgo(a.tsMs):'剛才'}</div></div>
        </div>`).join(''):'<div style="font-size:13px;color:var(--text3);padding:8px;font-weight:500">暫無動態</div>'}
    </div>
    <button class="btn-secondary" style="margin-top:8px" onclick="changeMemberName()">修改我的名稱</button>
    <div style="height:20px"></div>`;
}

function generateInviteCode(){const c=Math.random().toString(36).substr(2,6).toUpperCase();localStorage.setItem('homstock_invite',c);return c;}
window.copyInviteCode=function(code){navigator.clipboard.writeText(code).then(()=>showToast('✅ 邀請碼已複製！')).catch(()=>showToast('邀請碼：'+code));};
window.openJoinFamily=function(){document.getElementById('join-modal').classList.add('open');};
window.joinFamily=async function(){
  const name=document.getElementById('join-name').value.trim();
  const code=document.getElementById('join-code').value.trim().toUpperCase();
  if(!name||!code){showToast('請填寫名稱和邀請碼');return;}
  showToast('🔍 搜尋家庭中...');
  try{
    const famsSnap=await getDocs(collection(db,'families'));
    let found=null;
    famsSnap.forEach(d=>{if(d.data().code===code)found={id:d.id,...d.data()};});
    if(found){
      familyId=found.id;familyName=found.name;memberName=name;
      await setDoc(doc(db,`families/${familyId}/members/${currentUser.uid}`),{name,uid:currentUser.uid,joinedAt:serverTimestamp()});
      localStorage.setItem('homstock_family',JSON.stringify({fid:familyId,fname:familyName,mname:name}));
      document.getElementById('family-name').textContent=familyName;
      closeModal('join-modal');listenFamily();showToast(`✅ 已加入「${familyName}」！`);
    } else showToast('❌ 找不到此邀請碼');
  }catch(e){showToast('連線失敗，請重試');}
};
window.changeMemberName=function(){
  const name=prompt('輸入你的名稱：',memberName);
  if(name&&name.trim()){
    memberName=name.trim();
    const stored=JSON.parse(localStorage.getItem('homstock_family')||'{}');
    stored.mname=memberName;localStorage.setItem('homstock_family',JSON.stringify(stored));
    if(familyId!=='local'&&currentUser)setDoc(doc(db,`families/${familyId}/members/${currentUser.uid}`),{name:memberName,uid:currentUser.uid,updatedAt:serverTimestamp()},{merge:true});
    showToast(`✅ 名稱已更新為「${memberName}」`);renderFamily();
  }
};

function renderAnalysis(){
  const all=Object.values(items);
  const maxQ=Math.max(...all.map(i=>i.qty||0),1);
  const sorted=all.slice().sort((a,b)=>(a.qty||0)-(b.qty||0)).slice(0,8);
  const cats=[...new Set(all.map(i=>i.cat||'其他'))];
  const catColors=['#5B5FEF','#16A34A','#D97706','#DC2626','#7C3AED','#0891B2'];
  document.getElementById('main-content').innerHTML=`
    <div class="stats" style="grid-template-columns:repeat(2,minmax(0,1fr));margin-bottom:16px">
      <div class="stat-card ok"><div class="stat-num ok">${all.length}</div><div class="stat-label ok">總商品數</div></div>
      <div class="stat-card" style="background:#EDE9FE;border-color:#DDD6FE"><div class="stat-num" style="color:#5B5FEF">${cats.length}</div><div class="stat-label" style="color:#6D28D9">商品類別</div></div>
    </div>
    <div class="section-title"><span>庫存量排行（低→高）</span></div>
    <div style="background:#fff;border-radius:var(--radius);padding:16px;border:1.5px solid var(--border);margin-bottom:16px">
      ${sorted.map(item=>{
        const q=item.qty||0,t=item.threshold||1;
        const pct=Math.round((q/maxQ)*100);
        const cls=q===0?'empty-bar':q<=t?'warn':'';
        return `<div class="chart-bar-row">
          <div class="chart-label">${item.emoji||'📦'} ${item.name.length>5?item.name.slice(0,5)+'…':item.name}</div>
          <div class="chart-outer"><div class="chart-bar ${cls}" style="width:${Math.max(pct,8)}%"><span class="chart-bar-val">${q}</span></div></div>
        </div>`;
      }).join('')}
    </div>
    <div class="section-title"><span>補貨預測</span></div>
    <div style="background:#fff;border-radius:var(--radius);padding:16px;border:1.5px solid var(--border);margin-bottom:16px">
      ${all.filter(i=>(i.qty||0)>0).slice(0,6).map(item=>{
        const daysLeft=Math.min(Math.round((item.qty||0)/Math.max(0.3,1/7)*7),99);
        const urgency=daysLeft<7?'badge-red':daysLeft<14?'badge-yellow':'badge-green';
        const urgText=daysLeft<7?'本週需補':daysLeft<14?'兩週內':'充裕';
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1.5px solid var(--border)">
          <div style="font-size:14px;font-weight:500;color:var(--text)">${item.emoji||'📦'} ${item.name}</div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:12px;color:var(--text3);font-weight:500">約 ${daysLeft} 天</span>
            <span class="badge ${urgency}">${urgText}</span>
          </div>
        </div>`;
      }).join('')}
      <div style="font-size:11px;color:var(--text3);margin-top:10px;font-weight:500">*基於平均消耗估算</div>
    </div>
    <div class="section-title"><span>類別分佈</span></div>
    <div style="background:#fff;border-radius:var(--radius);padding:16px;border:1.5px solid var(--border);margin-bottom:16px">
      ${cats.map((cat,i)=>{
        const count=all.filter(item=>item.cat===cat).length;
        const pct=Math.round(count/all.length*100);
        return `<div class="chart-bar-row">
          <div class="chart-label" style="font-size:12px">${cat}</div>
          <div class="chart-outer"><div class="chart-bar" style="width:${Math.max(pct,8)}%;background:${catColors[i%6]}"><span class="chart-bar-val">${count}件</span></div></div>
        </div>`;
      }).join('')}
    </div>
    <div style="height:20px"></div>`;
}

window.openAddItem=function(){
  editingItemId=null;
  document.getElementById('item-modal-title').textContent='新增商品';
  ['item-name','item-emoji','item-barcode','item-links'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('item-qty').value='1';
  document.getElementById('item-threshold').value='2';
  document.getElementById('delete-btn').style.display='none';
  document.getElementById('item-modal').classList.add('open');
};
window.openEditItem=function(id){
  const item=items[id];if(!item)return;
  editingItemId=id;
  document.getElementById('item-modal-title').textContent='編輯商品';
  document.getElementById('item-name').value=item.name||'';
  document.getElementById('item-emoji').value=item.emoji||'';
  document.getElementById('item-qty').value=item.qty||0;
  document.getElementById('item-threshold').value=item.threshold||1;
  document.getElementById('item-barcode').value=item.barcode||'';
  document.getElementById('item-links').value=(item.links||[]).join('\n');
  document.getElementById('item-cat').value=item.cat||'衛生';
  document.getElementById('item-unit').value=item.unit||'個';
  document.getElementById('delete-btn').style.display='block';
  document.getElementById('item-modal').classList.add('open');
};
window.saveItem=async function(){
  const name=document.getElementById('item-name').value.trim();
  if(!name){showToast('請輸入商品名稱');return;}
  const data={
    name,emoji:document.getElementById('item-emoji').value||'📦',
    cat:document.getElementById('item-cat').value,
    qty:parseInt(document.getElementById('item-qty').value)||0,
    unit:document.getElementById('item-unit').value,
    threshold:parseInt(document.getElementById('item-threshold').value)||1,
    barcode:document.getElementById('item-barcode').value.trim(),
    links:document.getElementById('item-links').value.split('\n').map(l=>l.trim()).filter(Boolean),
    updatedBy:memberName,updatedAt:serverTimestamp()
  };
  closeModal('item-modal');
  if(familyId==='local'){const id=editingItemId||`local_${Date.now()}`;items[id]={...data,id};renderCurrentTab();showToast(editingItemId?'✅ 已更新':'✅ 已新增');}
  else if(editingItemId){await updateDoc(doc(db,`families/${familyId}/items/${editingItemId}`),data);await logActivity(`${memberName} 更新了「${name}」`);showToast('✅ 已更新');}
  else{await addDoc(collection(db,`families/${familyId}/items`),data);await logActivity(`${memberName} 新增了「${name}」`);showToast('✅ 已新增');}
};
window.deleteCurrentItem=async function(){
  if(!editingItemId||!confirm('確定刪除此商品？'))return;
  const name=items[editingItemId]?.name||'';
  closeModal('item-modal');
  if(familyId==='local')delete items[editingItemId];
  else{await deleteDoc(doc(db,`families/${familyId}/items/${editingItemId}`));await logActivity(`${memberName} 刪除了「${name}」`);}
  showToast('🗑️ 已刪除');renderCurrentTab();
};

window.openScanner=async function(){
  document.getElementById('scanner-modal').classList.add('open');
  document.getElementById('scanner-result').textContent='正在啟動相機...';
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const video=document.getElementById('scanner-video');
    video.srcObject=scanStream;await video.play();
    document.getElementById('scanner-result').textContent='請將條碼對準鏡頭';
    if(typeof Quagga!=='undefined'){
      Quagga.init({inputStream:{type:'LiveStream',target:video,constraints:{facingMode:'environment'}},decoder:{readers:['ean_reader','ean_8_reader','code_128_reader','upc_reader']}},err=>{
        if(!err){Quagga.start();Quagga.onDetected(r=>{
          const code=r.codeResult.code;
          document.getElementById('scanner-result').textContent=`✅ 掃描到：${code}`;
          stopScanner();
          const found=Object.values(items).find(i=>i.barcode===code);
          if(found){showToast(`找到：${found.name}`);openEditItem(found.id);}
          else{openAddItem();document.getElementById('item-barcode').value=code;}
        });}
      });
    }
  }catch(e){document.getElementById('scanner-result').textContent='無法開啟相機，請確認授權';}
};
window.stopScanner=function(){
  if(typeof Quagga!=='undefined'){try{Quagga.stop();}catch(e){}}
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  closeModal('scanner-modal');
};

function checkNotifications(){
  const low=Object.values(items).filter(i=>(i.qty||0)<=(i.threshold||1));
  if(low.length&&'Notification'in window&&Notification.permission==='granted'){
    low.slice(0,2).forEach(item=>new Notification('家庫 HomStock',{body:`${item.name} ${item.qty===0?'已用完':'庫存偏低'}，記得補貨！`}));
  }else if(low.length&&'Notification'in window&&Notification.permission==='default')Notification.requestPermission();
}

window.closeModal=function(id){document.getElementById(id).classList.remove('open');};
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
window.showToast=showToast;
function timeAgo(ms){const d=Date.now()-ms;if(d<60000)return '剛才';if(d<3600000)return `${Math.floor(d/60000)} 分鐘前`;if(d<86400000)return `${Math.floor(d/3600000)} 小時前`;return `${Math.floor(d/86400000)} 天前`;}

document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
renderInventory();
</script>
