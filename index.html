<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>家庫 HomStock</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#16213e;--card:#1e1e35;--card2:#252540;
--accent:#6c63ff;--accent2:#a78bfa;--green:#4ade80;--yellow:#fbbf24;--red:#f87171;
--text:#f0f0ff;--text2:#a0a0c0;--text3:#606080;--border:#2a2a4a;--radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.header{background:var(--bg2);padding:16px 20px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:20px;font-weight:700;color:var(--accent2);letter-spacing:-0.5px}
.logo span{color:var(--text2);font-weight:400;font-size:13px;display:block}
.header-actions{display:flex;gap:8px}
.icon-btn{background:var(--card2);border:none;color:var(--text2);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

/* Search */
.search-bar{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;color:var(--text2);font-size:14px}
.search-bar input{background:none;border:none;outline:none;color:var(--text);flex:1;font-size:14px}
.search-bar input::placeholder{color:var(--text3)}

/* Nav */
.nav{background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));position:sticky;bottom:0}
.nav-btn{flex:1;background:none;border:none;color:var(--text3);padding:6px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;transition:color 0.2s}
.nav-btn.active{color:var(--accent2)}
.nav-icon{font-size:20px;line-height:1}

/* Content */
.content{flex:1;overflow-y:auto;padding:16px}

/* Stats bar */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:12px;text-align:center;border:1px solid var(--border)}
.stat-num{font-size:22px;font-weight:700}
.stat-num.ok{color:var(--green)}
.stat-num.warn{color:var(--yellow)}
.stat-num.danger{color:var(--red)}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px}

/* Category pills */
.cats{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat-pill{background:var(--card2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:20px;white-space:nowrap;font-size:13px;cursor:pointer;flex-shrink:0}
.cat-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Item cards */
.items-grid{display:flex;flex-direction:column;gap:10px}
.item-card{background:var(--card);border-radius:var(--radius);padding:14px;border:1px solid var(--border);display:flex;align-items:center;gap:12px}
.item-card.low{border-left:3px solid var(--yellow)}
.item-card.empty{border-left:3px solid var(--red)}
.item-emoji{font-size:28px;width:44px;height:44px;background:var(--card2);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:15px;font-weight:500;margin-bottom:2px}
.item-meta{font-size:12px;color:var(--text3);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.item-qty{font-size:22px;font-weight:700;min-width:32px;text-align:right}
.item-qty.ok{color:var(--green)}
.item-qty.warn{color:var(--yellow)}
.item-qty.empty{color:var(--red)}
.qty-controls{display:flex;flex-direction:column;gap:4px;align-items:center}
.qty-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.qty-btn:active{background:var(--accent);border-color:var(--accent)}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.status-dot.ok{background:var(--green)}
.status-dot.warn{background:var(--yellow)}
.status-dot.empty{background:var(--red)}

/* Section title */
.section-title{font-size:13px;color:var(--text3);margin-bottom:10px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
.section-title a{color:var(--accent2);cursor:pointer;font-size:12px}

/* Buttons */
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:12px}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:14px;cursor:pointer;width:100%;margin-top:8px}
.btn-danger{background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.3);border-radius:10px;padding:12px;font-size:14px;cursor:pointer;width:100%;margin-top:8px}
.btn-green{background:rgba(74,222,128,0.15);color:var(--green);border:1px solid rgba(74,222,128,0.3);border-radius:10px;padding:12px;font-size:14px;cursor:pointer;flex:1;margin-top:8px}
.btn-wa{background:rgba(37,211,102,0.15);color:#25d366;border:1px solid rgba(37,211,102,0.3);border-radius:10px;padding:12px;font-size:14px;cursor:pointer;flex:1;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px}

/* Modal overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:600;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-label{font-size:13px;color:var(--text2);margin-bottom:6px;display:block}
.form-input{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;width:100%;outline:none}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
select.form-input option{background:var(--bg2)}

/* Shopping list */
.shop-item{background:var(--card);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;border:1px solid var(--border)}
.shop-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.shop-check.checked{background:var(--green);border-color:var(--green);color:#000}
.shop-info{flex:1}
.shop-name{font-size:14px;font-weight:500}
.shop-sub{font-size:12px;color:var(--text3);margin-top:2px}
.shop-link{font-size:12px;color:var(--accent2);cursor:pointer;text-decoration:none}

/* Family tab */
.family-card{background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border);margin-bottom:10px}
.member-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.member-row:last-child{border-bottom:none}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.invite-code{background:var(--card2);border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;margin-bottom:12px}
.invite-code .code{font-size:28px;font-weight:700;letter-spacing:6px;color:var(--accent2);margin:8px 0}
.invite-code p{font-size:12px;color:var(--text3)}

/* Activity */
.activity-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.activity-row:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:4px;flex-shrink:0}
.activity-text{color:var(--text2);line-height:1.5}
.activity-time{color:var(--text3);font-size:11px;margin-top:2px}

/* Scanner */
.scanner-area{background:var(--card);border-radius:var(--radius);padding:20px;text-align:center;border:2px dashed var(--border);margin-bottom:16px;cursor:pointer}
.scanner-icon{font-size:48px;margin-bottom:8px}
.scanner-text{color:var(--text2);font-size:14px}

/* Badge */
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.badge-green{background:rgba(74,222,128,0.15);color:var(--green)}
.badge-yellow{background:rgba(251,191,36,0.15);color:var(--yellow)}
.badge-red{background:rgba(248,113,113,0.15);color:var(--red)}
.badge-purple{background:rgba(108,99,255,0.15);color:var(--accent2)}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity 0.3s;border:1px solid var(--border);white-space:nowrap}
.toast.show{opacity:1}

/* Analysis */
.chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.chart-label{font-size:13px;color:var(--text2);width:70px;text-align:right;flex-shrink:0}
.chart-bar{height:22px;border-radius:4px;background:var(--accent);transition:width 0.5s;position:relative;display:flex;align-items:center;padding:0 8px}
.chart-bar-val{font-size:11px;color:#fff;font-weight:500;white-space:nowrap}
.chart-bar.warn{background:var(--yellow)}
.chart-bar.empty-bar{background:var(--red)}
.chart-outer{flex:1;background:var(--card2);border-radius:4px;overflow:hidden}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">家庫 HomStock<span id="family-name">我的家庭</span></div>
      <div class="header-actions">
        <button class="icon-btn" onclick="openScanner()" title="掃條碼">&#x1F4F7;</button>
        <button class="icon-btn" onclick="openAddItem()" title="新增">&#x2B;</button>
      </div>
    </div>
    <div class="search-bar">
      <span style="color:var(--text3);font-size:14px">&#x1F50D;</span>
      <input type="text" placeholder="搜尋商品..." id="search-input" oninput="filterItems()">
    </div>
  </div>

  <div class="content" id="main-content">
    <!-- Injected by JS -->
  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('inventory')" id="tab-inventory">
      <span class="nav-icon">&#x1F3E0;</span>庫存
    </button>
    <button class="nav-btn" onclick="switchTab('shopping')" id="tab-shopping">
      <span class="nav-icon">&#x1F6D2;</span>採購
    </button>
    <button class="nav-btn" onclick="switchTab('family')" id="tab-family">
      <span class="nav-icon">&#x1F465;</span>家庭
    </button>
    <button class="nav-btn" onclick="switchTab('analysis')" id="tab-analysis">
      <span class="nav-icon">&#x1F4CA;</span>分析
    </button>
  </nav>
</div>

<!-- Add/Edit Item Modal -->
<div class="overlay" id="item-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="item-modal-title">新增商品</div>
    <div class="form-group">
      <label class="form-label">商品名稱</label>
      <input class="form-input" id="item-name" placeholder="例：廁紙">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">類別</label>
        <select class="form-input" id="item-cat">
          <option value="衛生">衛生</option>
          <option value="清潔">清潔</option>
          <option value="個人護理">個人護理</option>
          <option value="廚房">廚房</option>
          <option value="嬰幼兒">嬰幼兒</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Emoji 圖示</label>
        <input class="form-input" id="item-emoji" placeholder="🧻" maxlength="2">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">目前數量</label>
        <input class="form-input" id="item-qty" type="number" min="0" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">單位</label>
        <select class="form-input" id="item-unit">
          <option>卷</option><option>瓶</option><option>包</option><option>支</option>
          <option>盒</option><option>片</option><option>罐</option><option>個</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">低庫存警示</label>
        <input class="form-input" id="item-threshold" type="number" min="1" placeholder="2">
      </div>
      <div class="form-group">
        <label class="form-label">條碼（選填）</label>
        <input class="form-input" id="item-barcode" placeholder="掃描或手動輸入">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">採購連結（可多個，換行分隔）</label>
      <textarea class="form-input" id="item-links" rows="2" placeholder="https://parknshop.com/...&#10;https://hktvmall.com/..."></textarea>
    </div>
    <button class="btn-primary" onclick="saveItem()">儲存</button>
    <button class="btn-secondary" onclick="closeModal('item-modal')">取消</button>
    <button class="btn-danger" id="delete-btn" onclick="deleteCurrentItem()" style="display:none">刪除此商品</button>
  </div>
</div>

<!-- Scanner Modal -->
<div class="overlay" id="scanner-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">條碼掃描</div>
    <div id="scanner-video-container" style="border-radius:10px;overflow:hidden;margin-bottom:12px;background:#000;min-height:200px;display:flex;align-items:center;justify-content:center">
      <video id="scanner-video" style="width:100%;border-radius:10px" autoplay playsinline muted></video>
    </div>
    <div id="scanner-result" style="font-size:13px;color:var(--text2);text-align:center;margin-bottom:12px;min-height:20px"></div>
    <button class="btn-secondary" onclick="stopScanner()">取消掃描</button>
  </div>
</div>

<!-- Family Join Modal -->
<div class="overlay" id="join-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">加入家庭群組</div>
    <div class="form-group">
      <label class="form-label">你的名稱</label>
      <input class="form-input" id="join-name" placeholder="例：媽媽">
    </div>
    <div class="form-group">
      <label class="form-label">邀請碼</label>
      <input class="form-input" id="join-code" placeholder="輸入6位邀請碼" maxlength="6" style="text-transform:uppercase;letter-spacing:4px;font-size:18px">
    </div>
    <button class="btn-primary" onclick="joinFamily()">加入</button>
    <button class="btn-secondary" onclick="closeModal('join-modal')">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, updateDoc, getDoc, getDocs, addDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKSkbBv4CU0yxazEc8Ws4-zLtk6p4YsTc",
  authDomain: "homeinventory-app.firebaseapp.com",
  projectId: "homeinventory-app",
  storageBucket: "homeinventory-app.firebasestorage.app",
  messagingSenderId: "971110271746",
  appId: "1:971110271746:web:79093bca9eb4f174b9101b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// State
let currentUser = null;
let familyId = null;
let familyName = "我的家庭";
let memberName = "成員";
let items = {};
let members = {};
let activities = [];
let currentTab = 'inventory';
let currentCat = '全部';
let editingItemId = null;
let scanStream = null;
let checkedShopItems = new Set();

// Default items
const defaultItems = [
  {name:"廁紙",emoji:"🧻",cat:"衛生",qty:4,unit:"卷",threshold:2,links:[]},
  {name:"洗頭水",emoji:"🧴",cat:"個人護理",qty:2,unit:"瓶",threshold:1,links:[]},
  {name:"牙膏",emoji:"🪥",cat:"個人護理",qty:2,unit:"支",threshold:1,links:[]},
  {name:"濕紙巾",emoji:"🧻",cat:"衛生",qty:3,unit:"包",threshold:1,links:[]},
  {name:"洗衣液",emoji:"🫧",cat:"清潔",qty:1,unit:"瓶",threshold:1,links:[]},
  {name:"洗碗液",emoji:"🍶",cat:"清潔",qty:2,unit:"瓶",threshold:1,links:[]},
  {name:"沐浴露",emoji:"🚿",cat:"個人護理",qty:2,unit:"瓶",threshold:1,links:[]},
  {name:"面紙",emoji:"📦",cat:"衛生",qty:5,unit:"盒",threshold:2,links:[]},
];

// Init
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    await initFamily();
  }
});

signInAnonymously(auth).catch(e => {
  showToast("⚠️ 連線失敗，使用本地模式");
  localMode();
});

async function initFamily() {
  const stored = localStorage.getItem('homstock_family');
  if (stored) {
    const {fid, fname, mname} = JSON.parse(stored);
    familyId = fid; familyName = fname; memberName = mname;
    document.getElementById('family-name').textContent = fname;
    listenFamily();
  } else {
    await createFamily();
  }
}

async function createFamily() {
  const code = Math.random().toString(36).substr(2,6).toUpperCase();
  memberName = "建立者";
  const ref = doc(collection(db,'families'));
  familyId = ref.id;
  familyName = "我的家庭";
  await setDoc(ref, {name:familyName, code, createdAt:serverTimestamp()});
  await setDoc(doc(db,`families/${familyId}/members/${currentUser.uid}`), {name:memberName, uid:currentUser.uid, joinedAt:serverTimestamp()});
  for (const item of defaultItems) {
    await addDoc(collection(db,`families/${familyId}/items`), {...item, updatedBy:memberName, updatedAt:serverTimestamp()});
  }
  localStorage.setItem('homstock_family', JSON.stringify({fid:familyId, fname:familyName, mname:memberName}));
  document.getElementById('family-name').textContent = familyName;
  listenFamily();
}

function listenFamily() {
  onSnapshot(collection(db,`families/${familyId}/items`), snap => {
    items = {};
    snap.forEach(d => items[d.id] = {...d.data(), id:d.id});
    renderCurrentTab();
    checkNotifications();
  });
  onSnapshot(collection(db,`families/${familyId}/members`), snap => {
    members = {};
    snap.forEach(d => members[d.id] = d.data());
  });
  onSnapshot(query(collection(db,`families/${familyId}/activities`), orderBy('ts','desc')), snap => {
    activities = [];
    snap.forEach(d => activities.push(d.data()));
    if (currentTab === 'family') renderFamily();
  });
}

async function logActivity(text) {
  try {
    await addDoc(collection(db,`families/${familyId}/activities`), {text, member:memberName, ts:serverTimestamp(), tsMs:Date.now()});
  } catch(e){}
}

// LOCAL MODE fallback
function localMode() {
  items = {};
  defaultItems.forEach((it,i) => { items[`local_${i}`] = {...it, id:`local_${i}`}; });
  familyId = 'local';
  renderCurrentTab();
}

// Tab switching
window.switchTab = function(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  renderCurrentTab();
};

function renderCurrentTab() {
  if (currentTab === 'inventory') renderInventory();
  else if (currentTab === 'shopping') renderShopping();
  else if (currentTab === 'family') renderFamily();
  else if (currentTab === 'analysis') renderAnalysis();
}

// INVENTORY
function renderInventory() {
  const search = (document.getElementById('search-input')||{}).value || '';
  const allCats = ['全部', ...new Set(Object.values(items).map(i => i.cat).filter(Boolean))];
  let filtered = Object.values(items).filter(i => {
    const matchCat = currentCat === '全部' || i.cat === currentCat;
    const matchSearch = !search || i.name.includes(search);
    return matchCat && matchSearch;
  });
  const ok = Object.values(items).filter(i => (i.qty||0) > (i.threshold||1)).length;
  const warn = Object.values(items).filter(i => (i.qty||0) <= (i.threshold||1) && (i.qty||0) > 0).length;
  const empty = Object.values(items).filter(i => (i.qty||0) === 0).length;

  document.getElementById('main-content').innerHTML = `
    <div class="stats">
      <div class="stat-card"><div class="stat-num ok">${ok}</div><div class="stat-label">充足</div></div>
      <div class="stat-card"><div class="stat-num warn">${warn}</div><div class="stat-label">偏低</div></div>
      <div class="stat-card"><div class="stat-num danger">${empty}</div><div class="stat-label">需補貨</div></div>
    </div>
    <div class="cats">${allCats.map(c=>`<div class="cat-pill${c===currentCat?' active':''}" onclick="setCat('${c}')">${c}</div>`).join('')}</div>
    <div class="section-title"><span>${currentCat} (${filtered.length})</span></div>
    <div class="items-grid">
      ${filtered.length ? filtered.sort((a,b)=>(a.qty||0)-(b.qty||0)).map(item => {
        const q = item.qty || 0;
        const t = item.threshold || 1;
        const cls = q === 0 ? 'empty' : q <= t ? 'low' : '';
        const qCls = q === 0 ? 'empty' : q <= t ? 'warn' : 'ok';
        return `<div class="item-card ${cls}" onclick="openEditItem('${item.id}')">
          <div class="item-emoji">${item.emoji||'📦'}</div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-meta">
              <span class="status-dot ${qCls}"></span>
              <span>${item.cat||''}</span>
              <span>${item.unit||''}</span>
              ${item.links&&item.links.length?`<span class="badge badge-purple">連結</span>`:''}
            </div>
          </div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="event.stopPropagation();changeQty('${item.id}',1)">＋</button>
            <div class="item-qty ${qCls}">${q}</div>
            <button class="qty-btn" onclick="event.stopPropagation();changeQty('${item.id}',-1)">－</button>
          </div>
        </div>`;
      }).join('') : '<div class="empty-state"><div class="icon">📭</div><p>沒有商品</p></div>'}
    </div>
    <div style="height:20px"></div>
  `;
}

window.setCat = function(cat) { currentCat = cat; renderInventory(); };
window.filterItems = function() { renderInventory(); };

window.changeQty = async function(id, delta) {
  const item = items[id];
  if (!item) return;
  const newQty = Math.max(0, (item.qty||0) + delta);
  items[id].qty = newQty;
  renderInventory();
  if (familyId !== 'local') {
    await updateDoc(doc(db,`families/${familyId}/items/${id}`), {qty:newQty, updatedBy:memberName, updatedAt:serverTimestamp()});
    await logActivity(`${memberName} 將「${item.name}」${delta>0?'增加':'減少'}至 ${newQty} ${item.unit}`);
  }
  if (newQty === 0) showToast(`⚠️ ${item.name} 已用完！`);
  else if (newQty <= (item.threshold||1)) showToast(`🟡 ${item.name} 庫存偏低`);
};

// SHOPPING
function renderShopping() {
  const lowItems = Object.values(items).filter(i => (i.qty||0) <= (i.threshold||1));
  document.getElementById('main-content').innerHTML = `
    <div class="section-title"><span>需補貨 (${lowItems.length})</span></div>
    ${lowItems.length ? lowItems.map(item => {
      const checked = checkedShopItems.has(item.id);
      const links = item.links || [];
      return `<div class="shop-item" style="${checked?'opacity:0.5':''}">
        <div class="shop-check ${checked?'checked':''}" onclick="toggleShopCheck('${item.id}')">
          ${checked?'✓':''}
        </div>
        <div class="shop-info">
          <div class="shop-name">${item.emoji||'📦'} ${item.name}</div>
          <div class="shop-sub">現有 ${item.qty||0} ${item.unit} · 建議補至 ${(item.threshold||1)*3} ${item.unit}</div>
          ${links.length ? links.map((l,i)=>`<a class="shop-link" href="${l}" target="_blank" onclick="event.stopPropagation()">🛒 採購連結 ${links.length>1?i+1:''}</a> `).join('') : ''}
        </div>
        <span class="badge ${item.qty===0?'badge-red':'badge-yellow'}">${item.qty===0?'已用完':'偏低'}</span>
      </div>`;
    }).join('') : '<div class="empty-state"><div class="icon">🎉</div><p>所有庫存充足！</p></div>'}
    ${lowItems.length ? `<div style="display:flex;gap:8px">
      <button class="btn-wa" onclick="shareWhatsApp()">
        <span style="font-size:16px">📱</span> WhatsApp 分享
      </button>
      <button class="btn-green" onclick="markAllBought()">全部已購</button>
    </div>` : ''}
    <div style="height:20px"></div>
  `;
}

window.toggleShopCheck = function(id) {
  if (checkedShopItems.has(id)) checkedShopItems.delete(id);
  else checkedShopItems.add(id);
  renderShopping();
};

window.markAllBought = async function() {
  const lowItems = Object.values(items).filter(i => (i.qty||0) <= (i.threshold||1));
  for (const item of lowItems) {
    const newQty = (item.threshold||1) * 3;
    items[item.id].qty = newQty;
    if (familyId !== 'local') {
      await updateDoc(doc(db,`families/${familyId}/items/${item.id}`), {qty:newQty, updatedBy:memberName, updatedAt:serverTimestamp()});
    }
  }
  if (familyId !== 'local') await logActivity(`${memberName} 完成補貨，更新了 ${lowItems.length} 件商品`);
  checkedShopItems.clear();
  showToast('✅ 已更新所有庫存！');
  renderCurrentTab();
};

window.shareWhatsApp = function() {
  const lowItems = Object.values(items).filter(i => (i.qty||0) <= (i.threshold||1));
  let msg = `🏠 *家庫採購清單*\n\n`;
  lowItems.forEach(item => {
    msg += `${item.qty===0?'❌':'⚠️'} ${item.name} (現有：${item.qty||0} ${item.unit})\n`;
  });
  msg += `\n_由 HomStock 家庫 生成_`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
};

// FAMILY
function renderFamily() {
  const memberList = Object.values(members);
  const inviteCode = localStorage.getItem('homstock_invite') || generateInviteCode();
  document.getElementById('main-content').innerHTML = `
    <div class="section-title"><span>邀請家人</span></div>
    <div class="invite-code">
      <p>分享邀請碼給家人</p>
      <div class="code">${inviteCode}</div>
      <p>有效期24小時 · 最多6位成員</p>
    </div>
    <button class="btn-secondary" onclick="copyInviteCode('${inviteCode}')">複製邀請碼</button>
    <button class="btn-secondary" onclick="openJoinFamily()" style="margin-top:6px">加入他人家庭</button>
    <div class="section-title" style="margin-top:20px"><span>成員 (${memberList.length})</span></div>
    <div class="family-card">
      ${memberList.length ? memberList.map((m,i) => {
        const colors = ['#6c63ff','#4ade80','#fbbf24','#f87171','#a78bfa','#34d399'];
        return `<div class="member-row">
          <div class="avatar" style="background:${colors[i%6]}22;color:${colors[i%6]}">${(m.name||'?').charAt(0)}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:500">${m.name||'匿名成員'}</div>
            <div style="font-size:12px;color:var(--text3)">成員</div>
          </div>
        </div>`;
      }).join('') : `<div class="member-row"><div class="avatar" style="background:#6c63ff22;color:#6c63ff">${memberName.charAt(0)}</div><div style="flex:1"><div style="font-size:14px;font-weight:500">${memberName}</div></div></div>`}
    </div>
    <div class="section-title" style="margin-top:20px"><span>最近動態</span></div>
    <div class="family-card">
      ${activities.length ? activities.slice(0,15).map(a => `
        <div class="activity-row">
          <div class="activity-dot"></div>
          <div>
            <div class="activity-text">${a.text||''}</div>
            <div class="activity-time">${a.tsMs ? timeAgo(a.tsMs) : '剛才'}</div>
          </div>
        </div>`).join('') : '<div style="font-size:13px;color:var(--text3);padding:8px">暫無動態</div>'}
    </div>
    <div style="margin-top:16px">
      <button class="btn-secondary" onclick="changeMemberName()">修改我的名稱</button>
    </div>
    <div style="height:20px"></div>
  `;
}

function generateInviteCode() {
  const code = Math.random().toString(36).substr(2,6).toUpperCase();
  localStorage.setItem('homstock_invite', code);
  return code;
}

window.copyInviteCode = function(code) {
  navigator.clipboard.writeText(code).then(() => showToast('✅ 邀請碼已複製！')).catch(()=>showToast('邀請碼：'+code));
};
window.openJoinFamily = function() { document.getElementById('join-modal').classList.add('open'); };
window.joinFamily = async function() {
  const name = document.getElementById('join-name').value.trim();
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!name || !code) { showToast('請填寫名稱和邀請碼'); return; }
  showToast('🔍 搜尋家庭中...');
  try {
    const famsSnap = await getDocs(collection(db,'families'));
    let found = null;
    famsSnap.forEach(d => { if (d.data().code === code) found = {id:d.id, ...d.data()}; });
    if (found) {
      familyId = found.id; familyName = found.name; memberName = name;
      await setDoc(doc(db,`families/${familyId}/members/${currentUser.uid}`), {name, uid:currentUser.uid, joinedAt:serverTimestamp()});
      localStorage.setItem('homstock_family', JSON.stringify({fid:familyId, fname:familyName, mname:name}));
      document.getElementById('family-name').textContent = familyName;
      closeModal('join-modal');
      listenFamily();
      showToast(`✅ 已加入「${familyName}」！`);
    } else {
      showToast('❌ 找不到此邀請碼');
    }
  } catch(e) { showToast('連線失敗，請重試'); }
};

window.changeMemberName = function() {
  const name = prompt('輸入你的名稱：', memberName);
  if (name && name.trim()) {
    memberName = name.trim();
    const stored = JSON.parse(localStorage.getItem('homstock_family')||'{}');
    stored.mname = memberName;
    localStorage.setItem('homstock_family', JSON.stringify(stored));
    if (familyId !== 'local' && currentUser) {
      setDoc(doc(db,`families/${familyId}/members/${currentUser.uid}`), {name:memberName, uid:currentUser.uid, updatedAt:serverTimestamp()}, {merge:true});
    }
    showToast(`✅ 名稱已更新為「${memberName}」`);
    renderFamily();
  }
};

// ANALYSIS
function renderAnalysis() {
  const all = Object.values(items);
  const byDate = all.sort((a,b) => (a.qty||0) - (b.qty||0)).slice(0,8);
  const maxQ = Math.max(...all.map(i => i.qty||0), 1);
  const cats = [...new Set(all.map(i=>i.cat||'其他'))];
  document.getElementById('main-content').innerHTML = `
    <div class="section-title"><span>庫存概覽</span></div>
    <div class="stats" style="grid-template-columns:1fr 1fr;margin-bottom:16px">
      <div class="stat-card"><div class="stat-num" style="color:var(--accent2)">${all.length}</div><div class="stat-label">總商品數</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--accent2)">${cats.length}</div><div class="stat-label">商品類別</div></div>
    </div>
    <div class="section-title"><span>庫存量排行</span></div>
    <div style="background:var(--card);border-radius:var(--radius);padding:14px;border:1px solid var(--border);margin-bottom:16px">
      ${byDate.map(item => {
        const q = item.qty||0; const t = item.threshold||1;
        const pct = Math.round((q/maxQ)*100);
        const cls = q===0?'empty-bar':q<=t?'warn':'';
        return `<div class="chart-bar-row">
          <div class="chart-label">${item.emoji||'📦'} ${item.name.length>5?item.name.slice(0,5)+'…':item.name}</div>
          <div class="chart-outer"><div class="chart-bar ${cls}" style="width:${Math.max(pct,8)}%"><span class="chart-bar-val">${q}</span></div></div>
        </div>`;
      }).join('')}
    </div>
    <div class="section-title"><span>消耗速度預測</span></div>
    <div style="background:var(--card);border-radius:var(--radius);padding:14px;border:1px solid var(--border);margin-bottom:16px">
      ${all.filter(i=>(i.qty||0)>0).slice(0,5).map(item => {
        const daysLeft = Math.round((item.qty||0) / Math.max(0.3, 1/7) * 7);
        const urgency = daysLeft < 7 ? 'badge-red' : daysLeft < 14 ? 'badge-yellow' : 'badge-green';
        const urgText = daysLeft < 7 ? '本週需補' : daysLeft < 14 ? '兩週內' : '充裕';
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:13px">${item.emoji||'📦'} ${item.name}</div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:12px;color:var(--text3)">約 ${Math.min(daysLeft,99)} 天</span>
            <span class="badge ${urgency}">${urgText}</span>
          </div>
        </div>`;
      }).join('')}
      <div style="font-size:11px;color:var(--text3);margin-top:8px">*預測基於平均消耗，隨使用習慣調整</div>
    </div>
    <div class="section-title"><span>各類別分佈</span></div>
    <div style="background:var(--card);border-radius:var(--radius);padding:14px;border:1px solid var(--border);margin-bottom:16px">
      ${cats.map((cat,i) => {
        const count = all.filter(item=>item.cat===cat).length;
        const pct = Math.round(count/all.length*100);
        const colors = ['var(--accent)','var(--green)','var(--yellow)','#f87171','#a78bfa','#34d399'];
        return `<div class="chart-bar-row">
          <div class="chart-label" style="font-size:11px">${cat}</div>
          <div class="chart-outer"><div class="chart-bar" style="width:${Math.max(pct,8)}%;background:${colors[i%6]}"><span class="chart-bar-val">${count}件</span></div></div>
        </div>`;
      }).join('')}
    </div>
    <div style="height:20px"></div>
  `;
}

// ADD/EDIT ITEM
window.openAddItem = function() {
  editingItemId = null;
  document.getElementById('item-modal-title').textContent = '新增商品';
  document.getElementById('item-name').value = '';
  document.getElementById('item-emoji').value = '';
  document.getElementById('item-qty').value = '1';
  document.getElementById('item-threshold').value = '2';
  document.getElementById('item-barcode').value = '';
  document.getElementById('item-links').value = '';
  document.getElementById('delete-btn').style.display = 'none';
  document.getElementById('item-modal').classList.add('open');
};

window.openEditItem = function(id) {
  const item = items[id];
  if (!item) return;
  editingItemId = id;
  document.getElementById('item-modal-title').textContent = '編輯商品';
  document.getElementById('item-name').value = item.name || '';
  document.getElementById('item-emoji').value = item.emoji || '';
  document.getElementById('item-qty').value = item.qty || 0;
  document.getElementById('item-threshold').value = item.threshold || 1;
  document.getElementById('item-barcode').value = item.barcode || '';
  document.getElementById('item-links').value = (item.links||[]).join('\n');
  document.getElementById('item-cat').value = item.cat || '衛生';
  document.getElementById('item-unit').value = item.unit || '個';
  document.getElementById('delete-btn').style.display = 'block';
  document.getElementById('item-modal').classList.add('open');
};

window.saveItem = async function() {
  const name = document.getElementById('item-name').value.trim();
  if (!name) { showToast('請輸入商品名稱'); return; }
  const data = {
    name, emoji: document.getElementById('item-emoji').value || '📦',
    cat: document.getElementById('item-cat').value,
    qty: parseInt(document.getElementById('item-qty').value) || 0,
    unit: document.getElementById('item-unit').value,
    threshold: parseInt(document.getElementById('item-threshold').value) || 1,
    barcode: document.getElementById('item-barcode').value.trim(),
    links: document.getElementById('item-links').value.split('\n').map(l=>l.trim()).filter(Boolean),
    updatedBy: memberName, updatedAt: serverTimestamp()
  };
  closeModal('item-modal');
  if (familyId === 'local') {
    const id = editingItemId || `local_${Date.now()}`;
    items[id] = {...data, id};
    renderCurrentTab(); showToast(editingItemId ? '✅ 已更新' : '✅ 已新增');
  } else if (editingItemId) {
    await updateDoc(doc(db,`families/${familyId}/items/${editingItemId}`), data);
    await logActivity(`${memberName} 更新了「${name}」`);
    showToast('✅ 已更新');
  } else {
    await addDoc(collection(db,`families/${familyId}/items`), data);
    await logActivity(`${memberName} 新增了「${name}」`);
    showToast('✅ 已新增');
  }
};

window.deleteCurrentItem = async function() {
  if (!editingItemId || !confirm('確定刪除此商品？')) return;
  const name = items[editingItemId]?.name || '';
  closeModal('item-modal');
  if (familyId === 'local') {
    delete items[editingItemId];
  } else {
    await deleteDoc(doc(db,`families/${familyId}/items/${editingItemId}`));
    await logActivity(`${memberName} 刪除了「${name}」`);
  }
  showToast('🗑️ 已刪除');
  renderCurrentTab();
};

// SCANNER
window.openScanner = async function() {
  document.getElementById('scanner-modal').classList.add('open');
  document.getElementById('scanner-result').textContent = '正在啟動相機...';
  try {
    scanStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const video = document.getElementById('scanner-video');
    video.srcObject = scanStream;
    await video.play();
    document.getElementById('scanner-result').textContent = '請將條碼對準鏡頭';
    if (typeof Quagga !== 'undefined') {
      Quagga.init({
        inputStream:{type:'LiveStream',target:video,constraints:{facingMode:'environment'}},
        decoder:{readers:['ean_reader','ean_8_reader','code_128_reader','upc_reader']}
      }, err => {
        if (!err) { Quagga.start(); Quagga.onDetected(onBarcodeDetected); }
      });
    }
  } catch(e) {
    document.getElementById('scanner-result').textContent = '無法開啟相機，請確認授權';
  }
};

function onBarcodeDetected(result) {
  const code = result.codeResult.code;
  document.getElementById('scanner-result').textContent = `✅ 掃描到：${code}`;
  stopScanner();
  const found = Object.values(items).find(i => i.barcode === code);
  if (found) { showToast(`找到：${found.name}`); openEditItem(found.id); }
  else {
    document.getElementById('item-barcode').value = code;
    openAddItem();
    document.getElementById('item-barcode').value = code;
  }
}

window.stopScanner = function() {
  if (typeof Quagga !== 'undefined') { try { Quagga.stop(); } catch(e){} }
  if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
  closeModal('scanner-modal');
};

// NOTIFICATIONS
function checkNotifications() {
  const low = Object.values(items).filter(i => (i.qty||0) <= (i.threshold||1));
  if (low.length && 'Notification' in window && Notification.permission === 'granted') {
    low.slice(0,3).forEach(item => {
      new Notification('家庫 HomStock', {
        body:`${item.name} ${item.qty===0?'已用完':'庫存偏低'}，記得補貨！`,
        icon:'/icon-192.png'
      });
    });
  } else if (low.length && 'Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// UTILS
window.closeModal = function(id) { document.getElementById(id).classList.remove('open'); };
window.showToast = showToast;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function timeAgo(ms) {
  const diff = Date.now() - ms;
  if (diff < 60000) return '剛才';
  if (diff < 3600000) return `${Math.floor(diff/60000)} 分鐘前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)} 小時前`;
  return `${Math.floor(diff/86400000)} 天前`;
}

// Close modal on overlay click
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

// Initial render
renderInventory();
</script>

</html>
