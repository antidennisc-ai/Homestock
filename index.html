<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#5B5FEF">
<link rel="manifest" href="manifest.json">
<title>全家庫有 RichHome</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
:root{
  --bg:#F7F8FF;--bg3:#EEF0FF;
  --accent:#5B5FEF;--accent2:#7C3AED;
  --green:#16A34A;--yellow:#D97706;--red:#DC2626;
  --green-bg:#DCFCE7;--yellow-bg:#FEF3C7;--red-bg:#FEE2E2;
  --green-lt:#BBF7D0;--yellow-lt:#FDE68A;--red-lt:#FECACA;
  --text:#1E1B4B;--text2:#4C4F8A;--text3:#9396C4;--border:#E0E3FF;--r:14px;
}
.app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text)}
.header{background:#fff;padding-top:calc(env(safe-area-inset-top,0px) + 12px);padding-left:16px;padding-right:16px;padding-bottom:10px;border-bottom:1.5px solid var(--border);flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:17px;font-weight:800;color:var(--accent);line-height:1.2}
.logo span{color:var(--accent2)}
.logo-sub{color:var(--text3);font-weight:400;font-size:11px;display:block;margin-top:1px}
.hbtns{display:flex;gap:7px}
.ibtn{background:var(--bg3);border:1.5px solid var(--border);color:var(--accent);width:36px;height:36px;border-radius:9px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.ibtn:active{background:var(--accent);color:#fff}
.sbar{background:var(--bg3);border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;display:flex;align-items:center;gap:7px}
.sbar input{background:none;border:none;outline:none;color:var(--text);flex:1;font-size:14px}
.sbar input::placeholder{color:var(--text3)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px}
.nav{background:#fff;border-top:1.5px solid var(--border);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
.nbtn{flex:1;background:none;border:none;color:var(--text3);padding:8px 4px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:500}
.nbtn.active{color:var(--accent)}
.nicon{font-size:20px;line-height:1}
.npip{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0;margin:1px auto 0}
.nbtn.active .npip{opacity:1}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:14px}
.sc{border-radius:12px;padding:12px 8px;text-align:center;border:1.5px solid}
.sc.ok{background:var(--green-bg);border-color:var(--green-lt)}
.sc.wn{background:var(--yellow-bg);border-color:var(--yellow-lt)}
.sc.ng{background:var(--red-bg);border-color:var(--red-lt)}
.sn{font-size:24px;font-weight:700}
.sn.ok{color:var(--green)}.sn.wn{color:var(--yellow)}.sn.ng{color:var(--red)}
.sl{font-size:11px;font-weight:500;margin-top:1px}
.sl.ok{color:#15803D}.sl.wn{color:#B45309}.sl.ng{color:#B91C1C}
.cats{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;scrollbar-width:none;padding-bottom:2px}
.cats::-webkit-scrollbar{display:none}
.cp{background:#fff;border:1.5px solid var(--border);color:var(--text2);padding:5px 13px;border-radius:20px;white-space:nowrap;font-size:13px;cursor:pointer;flex-shrink:0;font-weight:500}
.cp.active{background:var(--accent);border-color:var(--accent);color:#fff}
.stitle{font-size:11px;color:var(--text3);margin-bottom:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;display:flex;justify-content:space-between}
.items{display:flex;flex-direction:column;gap:9px}
.ic{background:#fff;border-radius:var(--r);padding:12px;border:1.5px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer}
.ic.low{border-left:4px solid var(--yellow);border-radius:0 var(--r) var(--r) 0}
.ic.empty{border-left:4px solid var(--red);border-radius:0 var(--r) var(--r) 0}
.iemoji{font-size:24px;width:42px;height:42px;background:var(--bg3);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid var(--border)}
.iinfo{flex:1;min-width:0}
.iname{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.imeta{font-size:11px;color:var(--text3);display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.qc{display:flex;flex-direction:column;gap:4px;align-items:center}
.qbtn{background:var(--bg3);border:1.5px solid var(--border);color:var(--accent);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1}
.qbtn:active{background:var(--accent);color:#fff;border-color:var(--accent)}
.iqty{font-size:18px;font-weight:700;min-width:26px;text-align:center}
.iqty.ok{color:var(--green)}.iqty.wn{color:var(--yellow)}.iqty.ng{color:var(--red)}
.bdg{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.bdg-g{background:var(--green-bg);color:#15803D}
.bdg-y{background:var(--yellow-bg);color:#B45309}
.bdg-r{background:var(--red-bg);color:#B91C1C}
.bdg-p{background:#EDE9FE;color:#6D28D9}
.bdg-b{background:#EFF6FF;color:#1D4ED8}
.bp{background:var(--accent);color:#fff;border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:10px}
.bs{background:#fff;color:var(--text2);border:1.5px solid var(--border);border-radius:11px;padding:11px;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-top:7px}
.bd{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-lt);border-radius:11px;padding:11px;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-top:7px}
.bg{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-lt);border-radius:11px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;flex:1;margin-top:7px}
.bw{background:#E7FFF0;color:#15803D;border:1.5px solid var(--green-lt);border-radius:11px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;flex:1;margin-top:7px;display:flex;align-items:center;justify-content:center;gap:5px}
.overlay{position:fixed;inset:0;background:rgba(30,27,75,0.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:18px 16px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 18px)}
.mhandle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.mtitle{font-size:17px;font-weight:700;color:var(--text);margin-bottom:14px}
.fg{margin-bottom:12px}
.fl{font-size:11px;color:var(--text3);margin-bottom:5px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:0.4px}
.fi{background:var(--bg3);border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-size:14px;width:100%;outline:none}
.fi:focus{border-color:var(--accent);background:#fff}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
select.fi option{background:#fff}
.shi{background:#fff;border-radius:11px;padding:12px 13px;display:flex;align-items:center;gap:10px;margin-bottom:7px;border:1.5px solid var(--border)}
.shck{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700}
.shck.chk{background:var(--green);border-color:var(--green);color:#fff}
.shn{font-size:14px;font-weight:600;color:var(--text)}
.shs{font-size:12px;color:var(--text3);margin-top:2px}
.shl{font-size:12px;color:var(--accent);font-weight:500;text-decoration:none;display:inline-block;margin-top:3px;margin-right:8px}
.fc{background:#fff;border-radius:var(--r);padding:14px;border:1.5px solid var(--border);margin-bottom:9px}
.mrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1.5px solid var(--border)}
.mrow:last-child{border-bottom:none}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.ic2{background:var(--bg3);border:2px dashed var(--border);border-radius:13px;padding:16px;text-align:center;margin-bottom:10px}
.ic2 .code{font-size:30px;font-weight:800;letter-spacing:7px;color:var(--accent);margin:8px 0}
.ic2 p{font-size:12px;color:var(--text3);font-weight:500}
.arow{display:flex;gap:9px;padding:8px 0;border-bottom:1.5px solid var(--border);font-size:13px}
.arow:last-child{border-bottom:none}
.adot{width:7px;height:7px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.atxt{color:var(--text2);line-height:1.5;font-weight:500}
.atime{color:var(--text3);font-size:11px;margin-top:1px}
.cbr{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.clbl{font-size:12px;color:var(--text2);width:65px;text-align:right;flex-shrink:0;font-weight:500}
.cout{flex:1;background:var(--bg3);border-radius:5px;overflow:hidden;height:22px}
.cbar{height:22px;border-radius:5px;background:var(--accent);display:flex;align-items:center;padding:0 7px;min-width:26px}
.cbarv{font-size:11px;color:#fff;font-weight:700}
.cbar.wn{background:var(--yellow)}.cbar.ng{background:var(--red)}
/* Timeline */
.tl-item{display:flex;gap:12px;margin-bottom:0}
.tl-left{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0}
.tl-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--accent);background:#fff;flex-shrink:0;margin-top:3px}
.tl-dot.filled{background:var(--accent)}
.tl-dot.future{border-color:var(--text3);background:var(--bg3)}
.tl-dot.warn{border-color:var(--yellow);background:var(--yellow)}
.tl-dot.danger{border-color:var(--red);background:var(--red)}
.tl-line{width:2px;background:var(--border);flex:1;margin:3px 0}
.tl-content{padding-bottom:16px;flex:1}
.tl-date{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:2px}
.tl-label{font-size:13px;font-weight:600;color:var(--text)}
.tl-sub{font-size:12px;color:var(--text3);margin-top:1px}
/* Forecast card */
.forecast-card{background:#fff;border-radius:var(--r);border:1.5px solid var(--border);padding:14px;margin-bottom:10px}
.forecast-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.forecast-name{font-size:14px;font-weight:600;color:var(--text)}
.forecast-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.forecast-row:last-child{border-bottom:none}
.forecast-key{font-size:12px;color:var(--text3);font-weight:500}
.forecast-val{font-size:12px;color:var(--text);font-weight:600}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 75px);left:50%;transform:translateX(-50%);background:#1E1B4B;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:400;opacity:0;transition:opacity 0.25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}
.empty{text-align:center;padding:36px 16px;color:var(--text3)}
.empty .ei{font-size:42px;margin-bottom:10px}
.empty p{font-size:14px;font-weight:500}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">全家庫有 <span>RichHome</span><span class="logo-sub" id="fam-name">載入中...</span></div>
      <div class="hbtns">
        <button class="ibtn" onclick="openScanner()">📷</button>
        <button class="ibtn" onclick="openAdd()">＋</button>
      </div>
    </div>
    <div class="sbar">
      <span style="color:var(--text3);font-size:14px">🔍</span>
      <input type="text" placeholder="搜尋商品..." id="srch" oninput="renderInv()">
    </div>
  </div>
  <div class="content" id="content"></div>
  <nav class="nav">
    <button class="nbtn active" onclick="goTab('inv')" id="t-inv"><span class="nicon">🏠</span>庫存<div class="npip"></div></button>
    <button class="nbtn" onclick="goTab('shop')" id="t-shop"><span class="nicon">🛒</span>採購<div class="npip"></div></button>
    <button class="nbtn" onclick="goTab('fam')" id="t-fam"><span class="nicon">👨‍👩‍👧</span>家庭<div class="npip"></div></button>
    <button class="nbtn" onclick="goTab('anal')" id="t-anal"><span class="nicon">📊</span>分析<div class="npip"></div></button>
  </nav>
</div>

<!-- Item modal -->
<div class="overlay" id="m-item">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle" id="m-item-title">新增商品</div>
    <div class="fg"><label class="fl">商品名稱</label><input class="fi" id="f-name" placeholder="例：廁紙"></div>
    <div class="frow">
      <div class="fg"><label class="fl">類別</label>
        <select class="fi" id="f-cat"><option>衛生</option><option>清潔</option><option>個人護理</option><option>廚房</option><option>嬰幼兒</option><option>其他</option></select>
      </div>
      <div class="fg"><label class="fl">Emoji</label><input class="fi" id="f-emoji" placeholder="🧻" maxlength="2"></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">數量</label><input class="fi" id="f-qty" type="number" min="0" placeholder="0"></div>
      <div class="fg"><label class="fl">單位</label>
        <select class="fi" id="f-unit"><option>卷</option><option>瓶</option><option>包</option><option>支</option><option>盒</option><option>片</option><option>罐</option><option>個</option></select>
      </div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">低庫存警示（數量）</label><input class="fi" id="f-thresh" type="number" min="1" placeholder="2"></div>
      <div class="fg"><label class="fl">平均使用天數/單位</label><input class="fi" id="f-days" type="number" min="1" placeholder="7"></div>
    </div>
    <div class="fg"><label class="fl">條碼（選填）</label><input class="fi" id="f-barcode" placeholder="掃描或手動輸入"></div>
    <div class="fg"><label class="fl">採購連結（換行分隔）</label><textarea class="fi" id="f-links" rows="2" placeholder="https://parknshop.com/...&#10;https://hktvmall.com/..."></textarea></div>
    <button class="bp" onclick="saveItem()">儲存</button>
    <button class="bs" onclick="closeM('m-item')">取消</button>
    <button class="bd" id="f-del" onclick="delItem()" style="display:none">刪除此商品</button>
  </div>
</div>

<!-- Scanner modal -->
<div class="overlay" id="m-scan">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">條碼掃描</div>
    <div style="border-radius:11px;overflow:hidden;margin-bottom:10px;background:var(--bg3);min-height:180px;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--border)">
      <video id="scan-vid" style="width:100%" autoplay playsinline muted></video>
    </div>
    <div id="scan-res" style="font-size:13px;color:var(--text2);text-align:center;margin-bottom:10px;font-weight:500;min-height:18px"></div>
    <button class="bs" onclick="stopScan()">取消掃描</button>
  </div>
</div>

<!-- Join modal -->
<div class="overlay" id="m-join">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">加入家庭群組</div>
    <div class="fg"><label class="fl">你的名稱</label><input class="fi" id="j-name" placeholder="例：媽媽"></div>
    <div class="fg"><label class="fl">邀請碼</label>
      <input class="fi" id="j-code" placeholder="輸入6位邀請碼" maxlength="6" style="text-transform:uppercase;letter-spacing:6px;font-size:20px;font-weight:700;text-align:center">
    </div>
    <div id="j-status" style="font-size:13px;color:var(--text3);text-align:center;min-height:18px;margin-top:4px;font-weight:500"></div>
    <button class="bp" onclick="joinFam()">搜尋並加入</button>
    <button class="bs" onclick="closeM('m-join')">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,doc,onSnapshot,setDoc,deleteDoc,updateDoc,getDocs,addDoc,serverTimestamp,query,orderBy}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import{getAuth,signInAnonymously,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const cfg={apiKey:"AIzaSyBKSkbBv4CU0yxazEc8Ws4-zLtk6p4YsTc",authDomain:"homeinventory-app.firebaseapp.com",projectId:"homeinventory-app",storageBucket:"homeinventory-app.firebasestorage.app",messagingSenderId:"971110271746",appId:"1:971110271746:web:79093bca9eb4f174b9101b"};
const fb=initializeApp(cfg),db=getFirestore(fb),auth=getAuth(fb);

let uid=null,famId=null,famName="我的家庭",myName="成員";
let items={},members={},acts=[],tab='inv',cat='全部',editId=null,scanStr=null,shopChecked=new Set();
let unsub1=null,unsub2=null,unsub3=null;

const defs=[
  {name:"廁紙",emoji:"🧻",cat:"衛生",qty:4,unit:"卷",threshold:2,daysPerUnit:3,links:[]},
  {name:"洗頭水",emoji:"🧴",cat:"個人護理",qty:2,unit:"瓶",threshold:1,daysPerUnit:30,links:[]},
  {name:"牙膏",emoji:"🪥",cat:"個人護理",qty:2,unit:"支",threshold:1,daysPerUnit:30,links:[]},
  {name:"濕紙巾",emoji:"🧻",cat:"衛生",qty:3,unit:"包",threshold:1,daysPerUnit:7,links:[]},
  {name:"洗衣液",emoji:"🫧",cat:"清潔",qty:1,unit:"瓶",threshold:1,daysPerUnit:14,links:[]},
  {name:"洗碗液",emoji:"🍶",cat:"清潔",qty:2,unit:"瓶",threshold:1,daysPerUnit:14,links:[]},
  {name:"沐浴露",emoji:"🚿",cat:"個人護理",qty:2,unit:"瓶",threshold:1,daysPerUnit:20,links:[]},
  {name:"面紙",emoji:"📦",cat:"衛生",qty:5,unit:"盒",threshold:2,daysPerUnit:7,links:[]},
];

onAuthStateChanged(auth,async u=>{if(u){uid=u.uid;await initFam();}});
signInAnonymously(auth).catch(()=>{toast("⚠️ 離線模式");localMode();});

async function initFam(){
  const s=localStorage.getItem('hs_fam');
  if(s){const d=JSON.parse(s);famId=d.fid;famName=d.fn;myName=d.mn;document.getElementById('fam-name').textContent=famName;listenFam();}
  else await createFam();
}
async function createFam(){
  const code=Math.random().toString(36).substr(2,6).toUpperCase();
  myName="建立者";const ref=doc(collection(db,'families'));
  famId=ref.id;famName="我的家庭";
  await setDoc(ref,{name:famName,code,createdAt:serverTimestamp()});
  await setDoc(doc(db,`families/${famId}/members/${uid}`),{name:myName,uid,joinedAt:serverTimestamp()});
  for(const it of defs)await addDoc(collection(db,`families/${famId}/items`),{...it,updatedBy:myName,updatedAt:serverTimestamp(),lastRestocked:Date.now()});
  saveFamLocal();document.getElementById('fam-name').textContent=famName;listenFam();
}
function saveFamLocal(){localStorage.setItem('hs_fam',JSON.stringify({fid:famId,fn:famName,mn:myName}));}

function listenFam(){
  if(unsub1)unsub1();if(unsub2)unsub2();if(unsub3)unsub3();
  unsub1=onSnapshot(collection(db,`families/${famId}/items`),sn=>{items={};sn.forEach(d=>items[d.id]={...d.data(),id:d.id});renderTab();checkNotif();});
  unsub2=onSnapshot(collection(db,`families/${famId}/members`),sn=>{members={};sn.forEach(d=>members[d.id]=d.data());if(tab==='fam')renderFam();});
  unsub3=onSnapshot(query(collection(db,`families/${famId}/activities`),orderBy('ts','desc')),sn=>{acts=[];sn.forEach(d=>acts.push(d.data()));if(tab==='fam')renderFam();});
}
async function logAct(text){try{await addDoc(collection(db,`families/${famId}/activities`),{text,member:myName,ts:serverTimestamp(),tsMs:Date.now()});}catch(e){}}

window.chQty=async function(id,d){
  const it=items[id];if(!it)return;
  const nq=Math.max(0,(it.qty||0)+d);
  const wasLow=(it.qty||0)<=(it.threshold||1);
  const update={qty:nq,updatedBy:myName,updatedAt:serverTimestamp()};
  // Record restock event when qty increases past threshold
  if(d>0&&nq>(it.threshold||1)&&wasLow){update.lastRestocked=Date.now();update.restockHistory=it.restockHistory?[...it.restockHistory.slice(-11),Date.now()]:[Date.now()];}
  items[id]={...items[id],...update};renderInv();
  if(famId!=='local'){await updateDoc(doc(db,`families/${famId}/items/${id}`),update);await logAct(`${myName} 將「${it.name}」${d>0?'增加':'減少'}至 ${nq} ${it.unit}`);}
  if(nq===0)toast(`⚠️ ${it.name} 已用完！`);
  else if(nq<=(it.threshold||1))toast(`🟡 ${it.name} 庫存偏低`);
};

// ANALYSIS — with purchase history timeline + forecast
function renderAnal(){
  const all=Object.values(items);
  const maxQ=Math.max(...all.map(i=>i.qty||0),1);
  const sorted=all.slice().sort((a,b)=>(a.qty||0)-(b.qty||0)).slice(0,8);
  const cats=[...new Set(all.map(i=>i.cat||'其他'))];
  const cc=['#5B5FEF','#16A34A','#D97706','#DC2626','#7C3AED','#0891B2'];
  const now=Date.now();

  // Build forecast data per item
  function getForecast(it){
    const dpu=it.daysPerUnit||7;
    const qty=it.qty||0;
    const totalDaysLeft=qty*dpu;
    const depletionDate=new Date(now+totalDaysLeft*864e5);
    const warnDate=new Date(now+(qty-((it.threshold||1)))*dpu*864e5);
    const lastR=it.lastRestocked?new Date(it.lastRestocked):null;
    // Average restock interval from history
    let avgInterval=null;
    const hist=it.restockHistory;
    if(hist&&hist.length>=2){
      const intervals=[];for(let i=1;i<hist.length;i++)intervals.push((hist[i]-hist[i-1])/864e5);
      avgInterval=Math.round(intervals.reduce((a,b)=>a+b,0)/intervals.length);
    }
    // Suggested buy-ahead date: 3 days before depletion warning
    const suggestBuyDate=new Date(warnDate.getTime()-3*864e5);
    return{dpu,totalDaysLeft:Math.round(totalDaysLeft),depletionDate,warnDate,lastR,avgInterval,suggestBuyDate};
  }

  const urgentItems=all.filter(it=>{const f=getForecast(it);return f.totalDaysLeft<14&&(it.qty||0)>0;}).sort((a,b)=>getForecast(a).totalDaysLeft-getForecast(b).totalDaysLeft);

  // Build timeline entries for top items
  function buildTimeline(it){
    const f=getForecast(it);
    const entries=[];
    if(f.lastR)entries.push({date:f.lastR,label:'上次補貨',sub:`補充至 ${it.qty||0} ${it.unit}`,type:'filled'});
    entries.push({date:new Date(now),label:'現在',sub:`剩餘 ${it.qty||0} ${it.unit}（${f.totalDaysLeft} 天）`,type:'filled'});
    if(f.suggestBuyDate>new Date(now))entries.push({date:f.suggestBuyDate,label:'建議採購日',sub:`提前購買以避免缺貨`,type:'warn'});
    entries.push({date:f.warnDate,label:'庫存警示線',sub:`降至警示水位 ${it.threshold||1} ${it.unit}`,type:'danger'});
    entries.push({date:f.depletionDate,label:'預計用完',sub:`按每單位 ${f.dpu} 天消耗`,type:'future'});
    return entries.sort((a,b)=>a.date-b.date);
  }

  const fmt=d=>d.toLocaleDateString('zh-HK',{month:'short',day:'numeric'});
  const topItems=all.filter(i=>(i.qty||0)>0).slice(0,4);

  document.getElementById('content').innerHTML=`
    <div class="stats" style="grid-template-columns:repeat(2,minmax(0,1fr))">
      <div class="sc ok"><div class="sn ok">${all.length}</div><div class="sl ok">總商品數</div></div>
      <div class="sc" style="background:#EDE9FE;border-color:#DDD6FE"><div class="sn" style="color:#5B5FEF">${cats.length}</div><div class="sl" style="color:#6D28D9">商品類別</div></div>
    </div>

    ${urgentItems.length?`
    <div class="stitle" style="margin-top:4px"><span>⚡ 14天內需採購</span></div>
    <div style="background:#fff;border-radius:var(--r);padding:14px;border:1.5px solid var(--red-lt);margin-bottom:12px">
      ${urgentItems.map(it=>{
        const f=getForecast(it);
        const ug=f.totalDaysLeft<7?'bdg-r':'bdg-y';
        return`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:13px;font-weight:600;color:var(--text)">${it.emoji||'📦'} ${it.name}</div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:11px;color:var(--text3)">建議 ${fmt(f.suggestBuyDate)}</span>
            <span class="bdg ${ug}">${f.totalDaysLeft}天</span>
          </div>
        </div>`;
      }).join('')}
    </div>`:''}

    <div class="stitle"><span>庫存時間表</span></div>
    ${topItems.map(it=>{
      const f=getForecast(it);
      const tl=buildTimeline(it);
      return`<div class="forecast-card">
        <div class="forecast-header">
          <div class="forecast-name">${it.emoji||'📦'} ${it.name}</div>
          <span class="bdg ${f.totalDaysLeft<7?'bdg-r':f.totalDaysLeft<14?'bdg-y':'bdg-g'}">剩 ${f.totalDaysLeft} 天</span>
        </div>
        <div style="padding:4px 0">
          ${tl.map((e,i)=>`<div class="tl-item">
            <div class="tl-left">
              <div class="tl-dot ${e.type}"></div>
              ${i<tl.length-1?`<div class="tl-line"></div>`:''}
            </div>
            <div class="tl-content">
              <div class="tl-date">${fmt(e.date)}</div>
              <div class="tl-label">${e.label}</div>
              <div class="tl-sub">${e.sub}</div>
            </div>
          </div>`).join('')}
        </div>
        ${f.avgInterval?`<div style="margin-top:8px;padding:8px;background:var(--bg3);border-radius:8px;font-size:12px;color:var(--text2)">📊 歷史平均補貨週期：<strong>${f.avgInterval} 天</strong>一次</div>`:''}
      </div>`;
    }).join('')}

    <div class="stitle"><span>庫存量排行（低→高）</span></div>
    <div style="background:#fff;border-radius:var(--r);padding:14px;border:1.5px solid var(--border);margin-bottom:12px">
      ${sorted.map(it=>{const q=it.qty||0,t=it.threshold||1,pct=Math.round(q/maxQ*100);const c=q===0?'ng':q<=t?'wn':'';
      return`<div class="cbr"><div class="clbl">${it.emoji||'📦'} ${it.name.length>5?it.name.slice(0,5)+'…':it.name}</div>
        <div class="cout"><div class="cbar ${c}" style="width:${Math.max(pct,8)}%"><span class="cbarv">${q}</span></div></div></div>`;}).join('')}
    </div>

    <div class="stitle"><span>類別分佈</span></div>
    <div style="background:#fff;border-radius:var(--r);padding:14px;border:1.5px solid var(--border);margin-bottom:12px">
      ${cats.map((c,i)=>{const cnt=all.filter(it=>it.cat===c).length,pct=Math.round(cnt/all.length*100);
      return`<div class="cbr"><div class="clbl" style="font-size:11px">${c}</div>
        <div class="cout"><div class="cbar" style="width:${Math.max(pct,8)}%;background:${cc[i%6]}"><span class="cbarv">${cnt}件</span></div></div></div>`;}).join('')}
    </div>
    <div style="font-size:11px;color:var(--text3);text-align:center;margin-bottom:16px">*消耗預測基於每件商品設定的「平均使用天數/單位」計算<br>在商品編輯頁可調整此數值使預測更準確</div>
    <div style="height:16px"></div>`;
}

// SCANNER
window.openScanner=async function(){
  document.getElementById('m-scan').classList.add('open');document.getElementById('scan-res').textContent='正在啟動相機...';
  try{
    scanStr=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const v=document.getElementById('scan-vid');v.srcObject=scanStr;await v.play();
    document.getElementById('scan-res').textContent='請將條碼對準鏡頭';
    if(typeof Quagga!=='undefined'){
      Quagga.init({inputStream:{type:'LiveStream',target:v,constraints:{facingMode:'environment'}},decoder:{readers:['ean_reader','ean_8_reader','code_128_reader','upc_reader']}},err=>{
        if(!err){Quagga.start();Quagga.onDetected(r=>{
          const code=r.codeResult.code;document.getElementById('scan-res').textContent=`✅ 掃描到：${code}`;stopScan();
          const f=Object.values(items).find(i=>i.barcode===code);
          if(f){toast(`找到：${f.name}`);openEdit(f.id);}
          else{openAdd();setTimeout(()=>{document.getElementById('f-barcode').value=code;},150);}
        });}
      });
    }
  }catch(e){document.getElementById('scan-res').textContent='無法開啟相機，請確認授權';}
};
window.stopScan=function(){if(typeof Quagga!=='undefined'){try{Quagga.stop();}catch(e){}}if(scanStr){scanStr.getTracks().forEach(t=>t.stop());scanStr=null;}closeM('m-scan');};

function checkNotif(){
  const low=Object.values(items).filter(i=>(i.qty||0)<=(i.threshold||1));
  if(!low.length)return;
  if('Notification'in window&&Notification.permission==='granted'){low.slice(0,2).forEach(it=>new Notification('全家庫有 RichHome',{body:`${it.name} ${it.qty===0?'已用完':'庫存偏低'}，記得補貨！`}));}
  else if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();
}

window.closeM=function(id){document.getElementById(id).classList.remove('open');};
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function timeAgo(ms){const d=Date.now()-ms;if(d<60000)return'剛才';if(d<3600000)return`${Math.floor(d/60000)}分鐘前`;if(d<86400000)return`${Math.floor(d/3600000)}小時前`;return`${Math.floor(d/86400000)}天前`;}
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
renderInv();
</script>
